<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alisya Beauty | Premium Muslimah Salon</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body style="opacity: 0; transition: opacity 0.5s;"> 

    <div id="login-overlay" class="overlay">
        <div class="login-card">
            <img src="assets/logo/logo.png" alt="Logo" onerror="this.style.display='none'">
            <h2>Selamat Datang</h2>
            <p>Alisya Beauty Premium Salon</p>
            <button id="btnLogin" class="btn-google">
                <i class="fa-brands fa-google" style="color: #DB4437;"></i> Login dengan Google
            </button>
        </div>
    </div>

    <header class="navbar">
        <div class="nav-brand">ALISYA BEAUTY</div>
        <div class="menu-toggle" id="openSidebar"><i class="fa-solid fa-bars"></i></div>
    </header>

    <main id="app-container">
        <div id="home-page" class="spa-page active">
            <section class="banner-promo">
                <h1>Promo Spesial</h1>
                <p>Dapatkan diskon 20% untuk perawatan pertama Anda</p>
                <button class="btn-main" data-target="booking-page">Booking Sekarang</button>
            </section>

            <section class="category-section">
                <h3>Kategori Perawatan</h3>
                <div class="category-grid">
                    <div class="cat-item"><i class="fa-solid fa-scissors"></i><span>Hair</span></div>
                    <div class="cat-item"><i class="fa-solid fa-face-smile"></i><span>Face</span></div>
                    <div class="cat-item"><i class="fa-solid fa-spa"></i><span>Body</span></div>
                </div>
            </section>
        </div>

        <div id="booking-page" class="spa-page"><h2>Booking</h2></div>
        <div id="services-page" class="spa-page"><h2>Services</h2></div>
        <div id="shop-page" class="spa-page"><h2>Shop</h2></div>
    </main>

    <nav class="bottom-nav">
        <a href="#" class="nav-link" data-target="home-page"><i class="fa-solid fa-house"></i></a>
        <a href="#" class="nav-link" data-target="services-page"><i class="fa-solid fa-spa"></i></a>
        <a href="#" class="nav-link" data-target="booking-page"><i class="fa-solid fa-calendar-check"></i></a>
        <a href="#" class="nav-link" data-target="shop-page"><i class="fa-solid fa-bag-shopping"></i></a>
    </nav>

    <script type="module" src="src/app/main.js"></script>
    <script>
    window.onerror = function(message, source, lineno, colno, error) {
        alert("Error: " + message + " di " + source + ":" + lineno);
    };
</script>
</body>
</html>
