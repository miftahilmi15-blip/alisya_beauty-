<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alisya Beauty | Premium Muslimah Salon</title>
    
    <meta name="description" content="Alisya Beauty Premium Muslimah Salon - Booking treatment, lihat promo, gallery dan layanan terbaik untuk muslimah.">
    <link rel="icon" href="assets/logo/favicon.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="mobile-web-app-capable" content="yes">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body> 

    <div id="loading-screen" class="loading-overlay">
        <div class="spinner"></div>
    </div>

    <div id="login-overlay" class="overlay hidden">
        <div class="login-card">
            <img src="assets/logo/logo.png" alt="Alisya Beauty" class="brand-logo" onerror="this.style.display='none'">
            <h2>Selamat Datang</h2>
            <p>Alisya Beauty Premium Salon</p>
            <button id="btnLogin" class="btn-google">
                <i class="fa-brands fa-google"></i> Login dengan Google
            </button>
        </div>
    </div>

    <div id="sidebar-backdrop" class="sidebar-backdrop"></div>
    <div id="sidebar" class="sidebar hidden">
        <div id="user-profile" class="sidebar-profile">
            <img id="user-avatar" src="" alt="Avatar" onerror="this.src='assets/logo/default-avatar.png'">
            <div class="user-info">
                <span id="user-name">Guest</span>
                <span id="user-email" style="font-size: 0.7rem; opacity: 0.7;"></span>
            </div>
        </div>

        <button id="close-sidebar" class="btn-close"><i class="fa-solid fa-xmark"></i></button>
        
        <nav class="sidebar-nav">
            <a href="#" id="admin-menu" class="hidden" style="color: var(--gold);">
                <i class="fa-solid fa-user-shield"></i> Admin Panel
            </a>
            <a href="#" data-social="about"><i class="fa-solid fa-info-circle"></i> About Us</a>
            <a href="#" data-social="tiktok"><i class="fa-brands fa-tiktok"></i> TikTok</a>
            <a href="#" data-social="instagram"><i class="fa-brands fa-instagram"></i> Instagram</a>
            <a href="#" data-social="whatsapp"><i class="fa-brands fa-whatsapp"></i> WhatsApp</a>
            
            <a href="#" id="logout-btn" style="color: #ff4d4d; margin-top: 20px;">
                <i class="fa-solid fa-sign-out-alt"></i> Logout
            </a>
        </nav>
    </div>

    <header class="navbar hidden">
        <button id="sidebar-trigger" class="btn-menu"><i class="fa-solid fa-bars"></i></button>
        <div class="nav-brand">ALISYA BEAUTY</div>
        <div style="width: 40px;"></div>
    </header>

    <main id="app-container" class="hidden">
        <section id="home-page" class="spa-page active"></section>
        <section id="services-page" class="spa-page"></section>
        <section id="gallery-page" class="spa-page"></section>
        <section id="shop-page" class="spa-page"></section>
        <section id="booking-page" class="spa-page"></section>
    </main>

    <nav id="bottom-nav" class="bottom-nav hidden">
        <a href="#" class="nav-link" data-page="services"><i class="fa-solid fa-list"></i><span>Services</span></a>
        <a href="#" class="nav-link" data-page="gallery"><i class="fa-solid fa-images"></i><span>Gallery</span></a>
        <a href="#" class="nav-link active" data-page="home"><i class="fa-solid fa-house"></i><span>HOME</span></a>
        <a href="#" class="nav-link" data-page="shop"><i class="fa-solid fa-cart-shopping"></i><span>Shop</span></a>
        <a href="#" class="nav-link" data-page="booking"><i class="fa-solid fa-calendar-check"></i><span>Booking</span></a>
    </nav>

    <script type="module">
    import { auth } from "./src/config/firebase.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { initializeAuth } from "./src/features/auth/authService.js";
    import { initLogin } from "./src/features/auth/login.js";
    import { initSidebarLinks } from "./src/components/sidebar.js";
    
    // Fungsi untuk menghilangkan loading apapun kondisinya
    const stopLoading = () => {
        const loading = document.getElementById('loading-screen');
        if(loading) loading.style.display = 'none';
    };

    document.addEventListener("DOMContentLoaded", () => {
        try {
            initializeAuth();
            initLogin();
            initSidebarLinks();

            onAuthStateChanged(auth, (user) => {
                stopLoading();
                const loginOverlay = document.getElementById('login-overlay');
                const navbar = document.querySelector('.navbar');
                const bottomNav = document.getElementById('bottom-nav');
                const appContainer = document.getElementById('app-container');

                if (user) {
                    loginOverlay?.classList.add('hidden');
                    navbar?.classList.remove('hidden');
                    bottomNav?.classList.remove('hidden');
                    appContainer?.classList.remove('hidden');
                } else {
                    loginOverlay?.classList.remove('hidden');
                    navbar?.classList.add('hidden');
                    bottomNav?.classList.add('hidden');
                    appContainer?.classList.add('hidden');
                }
            });
        } catch (err) {
            console.error("Gagal inisialisasi:", err);
            // Tetap buka aplikasi meski error agar tidak stuck di layar hitam
            stopLoading();
            document.getElementById('app-container')?.classList.remove('hidden');
        }

        // Sidebar Control tetap sama
        const sidebar = document.getElementById('sidebar');
        const trigger = document.getElementById('sidebar-trigger');
        const closeBtn = document.getElementById('close-sidebar');
        trigger?.addEventListener('click', () => sidebar?.classList.add('active'));
        closeBtn?.addEventListener('click', () => sidebar?.classList.remove('active'));
    });
</script>
</body>
</html>
